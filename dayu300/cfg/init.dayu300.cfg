{
    "import" : [
            "init.${ohos.boot.hardware}.usb.cfg"
    ],
    "jobs" : [{
            "name" : "pre-init",
            "cmds" : [
                "write /proc/sys/vm/min_free_kbytes 10240",
                "mount debugfs /sys/kernel/debug /sys/kernel/debug mode=755",
                "write /sys/kernel/debug/hisi_inno_phy/role peripheral",
                "export LIBVA_DRIVER_NAME ftd330"
            ]
        }, {
            "name" : "init",
            "cmds" : [
                "write /proc/1/oom_score_adj -1000",
                "write /proc/sys/kernel/hung_task_timeout_secs 90",
                "write /sys/kernel/hungtask/enable on",
                "write /sys/kernel/hungtask/monitorlist whitelist,init,appspawn",
                "symlink /dev/block/platform/soc/40000000.pcie/by-name /dev/block/by-name",
                "symlink /dev/block/nvme0n1p5 /dev/block/by-name/misc",
                "chown system system /sys/kernel/hungtask/userlist",
                "chmod 0666 /dev/dri/card0",
                "chmod 0666 /dev/dri/card1",
                "chmod 0666 /dev/dri/renderD129",
                "chown system graphics /dev/dri/card0",
                "chown system graphics /dev/dri/card1",
                "chown system graphics /dev/dri/renderD128",
                "chown system graphics /dev/dri/renderD129",
                "chmod 0666 /dev/galcore",
                "chmod 0666 /dev/graphics/galcore",
                "chmod 0666 /dev/ftg340",
                "chmod 0666 /dev/graphics/ftg340",
                "chmod 0666 /sys/class/backlight/phytium_bl2/brightness",
                "chmod 0666 /sys/class/backlight/phytium_bl2/max_brightness",
                "chmod 0666 /sys/class/backlight/phytium_bl1/brightness",
                "chmod 0666 /sys/class/backlight/phytium_bl1/max_brightness",
                "chmod 0666 /sys/class/backlight/phytium_bl0/brightness",
                "chmod 0666 /sys/class/backlight/phytium_bl0/max_brightness",
                "chmod 0666 /dev/pvr_sync"
            ]
        }, {
            "name" : "boot",
            "cmds" : [
                "chmod 777 /dev/ttyAMA2",
                "chmod 0440 /proc/interrupts",
                "chmod 0440 /proc/stat",
                "chown system graphics /dev/graphics/fb0",
                "start ispserver",
                "setparam persist.hdc.mode tcp",
                "setparam persist.hdc.port 8710",
                "setparam persist.hdc.root 1",
                "setparam persist.hdc.mode.tcp enable",
                "setparam const.security.developermode.state true",
                "setparam persist.multimedia.audio.ringtonevolume 15",
                "setparam ohos.boot.reboot_reason UNKNOWN"
            ]
        }, {
            "name" : "post-fs-data",
            "cmds" : [
                "restorecon",
                "param set const.security.developermode.state true"
            ]
        }
    ],
    "services" : [{
            "name" : "ispserver",
            "path" : ["/vendor/bin/ispserver"],
            "once" : 1
        }
    ]
}
