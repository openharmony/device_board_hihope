{
    "import" : [
        "/etc/ueventd.cfg",
        "/etc/updater_common.cfg",
        "/etc/init.phytium.usb.cfg"
    ],
    "jobs" : [{
            "name" : "pre-init",
            "cmds" : [
                "start ueventd",
                "load_private_persist_params "
            ]
        }, {
            "name" : "init",
            "cmds" : [
                "exec /bin/sh /etc/set_udc.sh",
                "setparam const.security.developermode.state true",
                "setparam persist.hdc.port 8710",
                "setparam persist.hdc.mode.tcp enable",
                "exec /bin/sh /etc/get_dhcp_ip.sh",
                "wait /dev/block/platform/soc/40000000.pcie",
                "symlink /dev/block/platform/soc/40000000.pcie/by-name /dev/block/by-name",
                "symlink /dev/block/nvme0n1p2  /dev/block/by-name/system",
                "symlink /dev/block/nvme0n1p3  /dev/block/by-name/vendor",
                "symlink /dev/block/nvme0n1p5  /dev/block/by-name/misc",
                "exec /bin/sh /etc/auto_burn_image.sh --yes"
            ]
        }, {
            "name" : "post-fs-data",
            "cmds" : [
                "exec /system/bin/hilog -w start -n 10 -f updater",
                "exec /system/bin/hilog -w start -t kmsg -f updater_kmsg"
            ]
        }
    ],
    "services" : [{
            "name" : "updater",
            "path" : ["/bin/updater"],
            "uid" : 0,
            "gid" : [0, "update", "input_user_host", "shell", "graphics", "system"],
            "importance" : 0,
            "secon" : "u:r:updater:s0"
        }
    ]
}
